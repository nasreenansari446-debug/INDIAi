<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharat AI</title>

<style>
* { box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #ff9933, #ffffff, #138808);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
}

body.dark { background: #121212; }

/* APP CONTAINER */

.app {
  width: 100%;
  max-width: 480px;
  height: 95vh;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

body.dark .app { background: #1e1e1e; color: #f0f0f0; }

/* LANDING PAGE */

.landing {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.landing h1 { font-size: 32px; margin: 0; color: #000080; }
.landing h2 { margin: 10px 0; font-size: 18px; }

.flag-line {
  width: 200px;
  height: 6px;
  margin: 20px 0;
  background: linear-gradient(to right, #ff9933, #ffffff, #138808);
  border-radius: 3px;
}

.start-btn {
  margin-top: 30px;
  padding: 12px 28px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: linear-gradient(to right, #ff9933, #138808);
  color: white;
  font-weight: 600;
}

/* CHAT UI */

.chat {
  flex: 1;
  display: none;
  flex-direction: column;
  height: 100%;
}

/* TOP BAR */

.topbar {
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #e0e0e0;
  font-weight: 600;
}

.controls { display: flex; gap: 8px; }

.btn {
  padding: 6px 10px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
  font-size: 13px;
}

body.dark .btn { background: #333; color: white; border: 1px solid #555; }

/* CHAT AREA */

.messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  background: #fafafa;
}

body.dark .messages { background: #121212; }

.bubble {
  max-width: 85%;
  padding: 10px 14px;
  margin: 8px 0;
  border-radius: 12px;
  line-height: 1.5;
  font-size: 15px;
  white-space: pre-wrap;
}

.user {
  background: #e3f2fd;
  margin-left: auto;
  border-bottom-right-radius: 2px;
}

.ai {
  background: #fff8e1;
  margin-right: auto;
  border-bottom-left-radius: 2px;
}

body.dark .user { background: #263238; color: white; }
body.dark .ai { background: #2a2a2a; color: white; }

/* INPUT */

.input-area {
  padding: 10px;
  border-top: 1px solid #e0e0e0;
  display: flex;
  gap: 6px;
  background: #ffffff;
}

body.dark .input-area { background: #1e1e1e; border-top: 1px solid #333; }

.input-area input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 15px;
}

.input-area button {
  padding: 10px 14px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(to right, #ff9933, #138808);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.mic-btn {
  background: #000080;
}

/* FLOATING SCROLL BUTTON */

#scrollBtn {
  position: absolute;
  bottom: 90px;
  right: 20px;
  padding: 10px 12px;
  border-radius: 50%;
  border: none;
  background: #000080;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div class="app">

  <!-- LANDING PAGE -->
  <div class="landing" id="landing">
    <h1>MADE IN INDIA</h1>
    <h2>MADE FOR INDIA</h2>
    <div class="flag-line"></div>
    <h2>Classic AI Assistant</h2>
    <button class="start-btn" onclick="startChat()">Start Bharat AI</button>
  </div>

  <!-- CHAT UI -->
  <div class="chat" id="chat">

    <div class="topbar">
      🇮🇳 Bharat AI
      <div class="controls">
        <button class="btn" onclick="toggleLang()">🌐</button>
        <button class="btn" onclick="toggleDark()">🌙</button>
        <button class="btn" onclick="clearChat()">🧹</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <button id="scrollBtn" onclick="scrollToBottom()">🔽</button>

    <div class="input-area">
      <button class="mic-btn" onclick="startVoice()">🎤</button>
      <input id="userInput" type="text" placeholder="Ask Bharat AI..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script>
const GROQ_API_KEY = "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";

let currentLang = "en";

const landing = document.getElementById("landing");
const chat = document.getElementById("chat");
const messagesDiv = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const scrollBtn = document.getElementById("scrollBtn");

/* START CHAT */

function startChat() {
  landing.style.display = "none";
  chat.style.display = "flex";
  loadHistory();
  userInput.focus();
}

/* DARK MODE */

function toggleDark() {
  document.body.classList.toggle("dark");
}

/* LANGUAGE */

function toggleLang() {
  currentLang = currentLang === "en" ? "hi" : "en";
  alert("Language: " + (currentLang === "en" ? "English" : "Hindi"));
}

/* ADD BUBBLE */

function addBubble(text, className) {
  const div = document.createElement("div");
  div.className = "bubble " + className;
  div.innerText = text;
  messagesDiv.appendChild(div);
  saveHistory();
  return div;
}

/* FAST + STABLE TYPING */

function typeTextFast(element, text) {
  let i = 0;
  const speed = 5;

  const interval = setInterval(() => {
    element.innerText += text.slice(i, i + 2);
    i += 2;

    autoScroll();

    if (i >= text.length) {
      clearInterval(interval);
      autoScroll();
      saveHistory();
    }
  }, speed);
}

/* SEND MESSAGE */

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  addBubble(text, "user");
  userInput.value = "";

  const aiBubble = addBubble("Thinking...", "ai");

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_API_KEY
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          {
            role: "system",
            content: currentLang === "hi"
              ? "तुम भारत एआई हो, हमेशा हिंदी में उत्तर दो।"
              : "You are Bharat AI, reply in English."
          },
          { role: "user", content: text }
        ]
      })
    });

    const data = await response.json();

    if (data.error) {
      aiBubble.innerText = "Error: " + data.error.message;
      return;
    }

    const aiText = data.choices[0].message.content;
    aiBubble.innerText = "";
    typeTextFast(aiBubble, aiText);

  } catch (err) {
    aiBubble.innerText = "Error connecting to AI.";
  }
}

/* ENTER KEY */

userInput.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

/* SCROLL MANAGEMENT */

function autoScroll() {
  const threshold = 80;
  const distanceFromBottom =
    messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight;

  if (distanceFromBottom < threshold) {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
}

function scrollToBottom() {
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* SHOW / HIDE SCROLL BUTTON */

messagesDiv.addEventListener("scroll", () => {
  const distanceFromBottom =
    messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight;

  if (distanceFromBottom > 120) {
    scrollBtn.style.display = "block";
  } else {
    scrollBtn.style.display = "none";
  }
});

/* CLEAR CHAT */

function clearChat() {
  if (!confirm("Clear entire chat?")) return;
  messagesDiv.innerHTML = "";
  localStorage.removeItem("bharat_chat");
}

/* SAVE + LOAD HISTORY */

function saveHistory() {
  localStorage.setItem("bharat_chat", messagesDiv.innerHTML);
}

function loadHistory() {
  const saved = localStorage.getItem("bharat_chat");
  if (saved) {
    messagesDiv.innerHTML = saved;
    scrollToBottom();
  }
}

/* 🎤 VOICE INPUT (RESTORED) */

function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert("Speech recognition not supported in this browser.");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = currentLang === "hi" ? "hi-IN" : "en-US";

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    userInput.value = text;
    sendMessage();
  };

  recognition.start();
}
</script>

</body>
</html>
